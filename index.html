<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>To-Do List App</title>
  <link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;600;700;800&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet"/>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg: #0f0e11;
      --surface: #1a1820;
      --surface2: #231f2e;
      --accent: #c8f04d;
      --accent2: #a78bfa;
      --text: #f0edf8;
      --muted: #6e6a82;
      --danger: #ff6b6b;
      --border: #2e2a3a;
      --done-bg: #1c1f17;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      min-height: 100vh;
      display: flex;
      align-items: flex-start;
      justify-content: center;
      padding: 40px 16px 80px;
    }

    /* Background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(var(--border) 1px, transparent 1px),
        linear-gradient(90deg, var(--border) 1px, transparent 1px);
      background-size: 40px 40px;
      opacity: 0.3;
      pointer-events: none;
      z-index: 0;
    }

    .container {
      width: 100%;
      max-width: 600px;
      position: relative;
      z-index: 1;
      animation: fadeUp 0.6s ease both;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(30px); }
      to   { opacity: 1; transform: translateY(0); }
    }

    /* Header */
    .header {
      margin-bottom: 36px;
    }

    .header-tag {
      font-family: 'DM Sans', sans-serif;
      font-size: 11px;
      font-weight: 500;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: var(--accent);
      margin-bottom: 8px;
    }

    .header h1 {
      font-family: 'Syne', sans-serif;
      font-size: clamp(2rem, 6vw, 3.2rem);
      font-weight: 800;
      line-height: 1;
      color: var(--text);
    }

    .header h1 span {
      color: var(--accent);
    }

    .stats-row {
      display: flex;
      gap: 20px;
      margin-top: 16px;
    }

    .stat {
      display: flex;
      flex-direction: column;
    }

    .stat-num {
      font-family: 'Syne', sans-serif;
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--text);
      line-height: 1;
    }

    .stat-label {
      font-size: 11px;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 1px;
      margin-top: 2px;
    }

    /* Input */
    .input-section {
      display: flex;
      gap: 10px;
      margin-bottom: 28px;
    }

    .input-wrap {
      flex: 1;
      position: relative;
    }

    .task-input {
      width: 100%;
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 12px;
      padding: 14px 18px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 15px;
      outline: none;
      transition: border-color 0.2s, box-shadow 0.2s;
    }

    .task-input::placeholder { color: var(--muted); }

    .task-input:focus {
      border-color: var(--accent);
      box-shadow: 0 0 0 3px rgba(200, 240, 77, 0.12);
    }

    .add-btn {
      background: var(--accent);
      color: #0f0e11;
      border: none;
      border-radius: 12px;
      padding: 0 22px;
      font-family: 'Syne', sans-serif;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      white-space: nowrap;
      transition: transform 0.15s, opacity 0.15s;
    }

    .add-btn:hover { transform: scale(1.04); }
    .add-btn:active { transform: scale(0.97); }

    /* Filter tabs */
    .filter-tabs {
      display: flex;
      gap: 6px;
      margin-bottom: 20px;
      background: var(--surface);
      border-radius: 10px;
      padding: 4px;
      border: 1px solid var(--border);
    }

    .filter-tab {
      flex: 1;
      background: transparent;
      border: none;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 500;
      padding: 8px;
      border-radius: 7px;
      cursor: pointer;
      transition: background 0.2s, color 0.2s;
    }

    .filter-tab.active {
      background: var(--accent);
      color: #0f0e11;
      font-weight: 700;
    }

    /* Task list */
    .task-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .task-item {
      background: var(--surface);
      border: 1.5px solid var(--border);
      border-radius: 14px;
      padding: 16px 18px;
      display: flex;
      align-items: center;
      gap: 14px;
      animation: slideIn 0.3s ease both;
      transition: border-color 0.2s, background 0.2s;
    }

    .task-item:hover {
      border-color: var(--accent2);
    }

    .task-item.done {
      background: var(--done-bg);
      border-color: #2a2a1f;
      opacity: 0.7;
    }

    @keyframes slideIn {
      from { opacity: 0; transform: translateX(-16px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    /* Checkbox */
    .check-btn {
      width: 24px;
      height: 24px;
      border-radius: 50%;
      border: 2px solid var(--border);
      background: transparent;
      cursor: pointer;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: border-color 0.2s, background 0.2s;
      font-size: 13px;
      color: transparent;
    }

    .task-item.done .check-btn {
      background: var(--accent);
      border-color: var(--accent);
      color: #0f0e11;
    }

    .check-btn:hover {
      border-color: var(--accent);
    }

    /* Task text */
    .task-text {
      flex: 1;
      font-size: 15px;
      font-weight: 400;
      color: var(--text);
      line-height: 1.4;
      word-break: break-word;
      transition: color 0.2s;
    }

    .task-item.done .task-text {
      text-decoration: line-through;
      color: var(--muted);
    }

    /* Priority badge */
    .priority-badge {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 1px;
      text-transform: uppercase;
      padding: 3px 8px;
      border-radius: 20px;
      flex-shrink: 0;
    }

    .priority-badge.high   { background: rgba(255,107,107,0.15); color: var(--danger); }
    .priority-badge.medium { background: rgba(167,139,250,0.15); color: var(--accent2); }
    .priority-badge.low    { background: rgba(200,240,77,0.12);  color: var(--accent); }

    /* Delete btn */
    .delete-btn {
      background: transparent;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 18px;
      padding: 4px;
      border-radius: 6px;
      transition: color 0.2s, background 0.2s;
      flex-shrink: 0;
      line-height: 1;
    }

    .delete-btn:hover {
      color: var(--danger);
      background: rgba(255,107,107,0.1);
    }

    /* Priority selector */
    .priority-select {
      background: var(--surface2);
      border: 1.5px solid var(--border);
      border-radius: 10px;
      color: var(--text);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 14px 10px;
      outline: none;
      cursor: pointer;
    }

    /* Empty state */
    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: var(--muted);
    }

    .empty-icon {
      font-size: 48px;
      margin-bottom: 12px;
      opacity: 0.5;
    }

    .empty-state p {
      font-size: 15px;
    }

    /* Clear all */
    .footer-actions {
      margin-top: 20px;
      display: flex;
      justify-content: flex-end;
    }

    .clear-btn {
      background: transparent;
      border: 1.5px solid var(--border);
      border-radius: 8px;
      color: var(--muted);
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      padding: 8px 16px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }

    .clear-btn:hover {
      border-color: var(--danger);
      color: var(--danger);
    }

    /* Progress bar */
    .progress-wrap {
      margin-bottom: 28px;
    }

    .progress-label {
      display: flex;
      justify-content: space-between;
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 8px;
    }

    .progress-bar {
      height: 4px;
      background: var(--surface2);
      border-radius: 99px;
      overflow: hidden;
    }

    .progress-fill {
      height: 100%;
      background: linear-gradient(90deg, var(--accent2), var(--accent));
      border-radius: 99px;
      transition: width 0.4s ease;
    }
  </style>
</head>
<body>
<div class="container">

  <div class="header">
    <div class="header-tag">✦ Task Manager</div>
    <h1>My <span>To-Do</span><br>List</h1>
    <div class="stats-row">
      <div class="stat">
        <span class="stat-num" id="totalCount">0</span>
        <span class="stat-label">Total</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="doneCount">0</span>
        <span class="stat-label">Done</span>
      </div>
      <div class="stat">
        <span class="stat-num" id="pendingCount">0</span>
        <span class="stat-label">Pending</span>
      </div>
    </div>
  </div>

  <!-- Progress -->
  <div class="progress-wrap">
    <div class="progress-label">
      <span>Progress</span>
      <span id="progressText">0%</span>
    </div>
    <div class="progress-bar">
      <div class="progress-fill" id="progressFill" style="width:0%"></div>
    </div>
  </div>

  <!-- Input -->
  <div class="input-section">
    <div class="input-wrap">
      <input class="task-input" id="taskInput" type="text" placeholder="Add a new task..." maxlength="120"/>
    </div>
    <select class="priority-select" id="prioritySelect">
      <option value="medium">⚡ Med</option>
      <option value="high">🔴 High</option>
      <option value="low">🟢 Low</option>
    </select>
    <button class="add-btn" onclick="addTask()">+ Add</button>
  </div>

  <!-- Filter Tabs -->
  <div class="filter-tabs">
    <button class="filter-tab active" onclick="setFilter('all', this)">All</button>
    <button class="filter-tab" onclick="setFilter('active', this)">Active</button>
    <button class="filter-tab" onclick="setFilter('done', this)">Done</button>
  </div>

  <!-- Task List -->
  <div class="task-list" id="taskList"></div>

  <!-- Footer -->
  <div class="footer-actions">
    <button class="clear-btn" onclick="clearCompleted()">Clear Completed</button>
  </div>

</div>

<script>
  let tasks = JSON.parse(localStorage.getItem('tasks') || '[]');
  let filter = 'all';

  function saveTasks() {
    localStorage.setItem('tasks', JSON.stringify(tasks));
  }

  function addTask() {
    const input = document.getElementById('taskInput');
    const priority = document.getElementById('prioritySelect').value;
    const text = input.value.trim();
    if (!text) return;

    tasks.unshift({ id: Date.now(), text, priority, done: false });
    input.value = '';
    saveTasks();
    render();
  }

  function toggleTask(id) {
    tasks = tasks.map(t => t.id === id ? { ...t, done: !t.done } : t);
    saveTasks();
    render();
  }

  function deleteTask(id) {
    tasks = tasks.filter(t => t.id !== id);
    saveTasks();
    render();
  }

  function clearCompleted() {
    tasks = tasks.filter(t => !t.done);
    saveTasks();
    render();
  }

  function setFilter(f, btn) {
    filter = f;
    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    render();
  }

  function render() {
    const list = document.getElementById('taskList');
    const total = tasks.length;
    const done = tasks.filter(t => t.done).length;
    const pending = total - done;
    const pct = total === 0 ? 0 : Math.round((done / total) * 100);

    document.getElementById('totalCount').textContent = total;
    document.getElementById('doneCount').textContent = done;
    document.getElementById('pendingCount').textContent = pending;
    document.getElementById('progressText').textContent = pct + '%';
    document.getElementById('progressFill').style.width = pct + '%';

    let filtered = tasks;
    if (filter === 'active') filtered = tasks.filter(t => !t.done);
    if (filter === 'done')   filtered = tasks.filter(t => t.done);

    if (filtered.length === 0) {
      list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📋</div>
          <p>${filter === 'done' ? 'No completed tasks yet.' : filter === 'active' ? 'No active tasks!' : 'Add your first task above!'}</p>
        </div>`;
      return;
    }

    list.innerHTML = filtered.map(t => `
      <div class="task-item ${t.done ? 'done' : ''}">
        <button class="check-btn" onclick="toggleTask(${t.id})">✓</button>
        <span class="task-text">${escapeHtml(t.text)}</span>
        <span class="priority-badge ${t.priority}">${t.priority}</span>
        <button class="delete-btn" onclick="deleteTask(${t.id})">✕</button>
      </div>
    `).join('');
  }

  function escapeHtml(str) {
    return str.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
  }

  // Enter key support
  document.getElementById('taskInput').addEventListener('keydown', e => {
    if (e.key === 'Enter') addTask();
  });

  render();
</script>
</body>
</html>
